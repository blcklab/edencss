<section class="container section stack-y gap-y-6">

    <p class="text-primary font-semibold">Buttons</p>
    <h2 class="text-3xl font-bold">Action styles built with utilities.</h2>
    <p class="text-muted">Use spacing, radius, color, shadow, transition, and touch helpers.</p>
  </div>

  <div class="cluster gap-3">
    <button class="inline-flex items-center justify-center touch px-4 py-2 rounded-lg bg-primary text-white font-semibold shadow-sm transition hover-lift">

    </button>
    <button class="inline-flex items-center justify-center touch px-4 py-2 rounded-lg glass font-semibold transition hover-lift">
      Glass
    </button>
    <button class="inline-flex items-center justify-center touch px-4 py-2 rounded-lg border border-soft font-semibold transition hover-lift">
      Outline
    </button>
    <button class="inline-flex items-center justify-center touch px-4 py-2 rounded-full bg-soft text-primary font-semibold">
      Pill button
    </button>
