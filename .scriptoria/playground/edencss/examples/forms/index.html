<section class="container section stack-y gap-y-8">
  <div class="stack-y gap-y-2">
    <p class="text-primary font-semibold">Forms</p>
    <h2 class="text-3xl font-bold">Simple form shell.</h2>
    <p class="text-muted">Use generic control tokens later for component packages.</p>
  </div>

  <form class="glass rounded-xl p-6 shadow-md stack-y gap-y-4">
    <label class="stack-y gap-y-2">
      <span class="font-semibold">Name</span>
      <input class="w-full px-4 py-3 rounded-lg border border-soft" placeholder="Jane Doe" />
    </label>

    <label class="stack-y gap-y-2">
      <span class="font-semibold">Email</span>
      <input class="w-full px-4 py-3 rounded-lg border border-soft" placeholder="jane@example.com" />
    </label>

    <label class="stack-y gap-y-2">
      <span class="font-semibold">Message</span>
      <textarea class="w-full px-4 py-3 rounded-lg border border-soft" rows="5" placeholder="Tell us about your project"></textarea>
    </label>

    <button class="inline-flex items-center justify-center touch px-5 py-3 rounded-lg bg-primary text-white font-semibold shadow-md" type="button">
      Send message
    </button>
  </form>
</section>
